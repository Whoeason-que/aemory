[package]
name = "aemory"
version = "0.1.0"
edition = "2021"

[lib]
name = "aemory"
crate-type = ["cdylib", "rlib"]

[dependencies]
# Core dependencies
lance = "1.0.4"
arrow = "56.2.0"
arrow-array = "56.2.0"
arrow-schema = "56.2.0"
fastembed = "5.8.1"

# CLI and Async
clap = { version = "4.5", features = ["derive"] }
tokio = { version = "1.39", features = ["full"] }

# Utilities
gray_matter = "0.3.2"
uuid = { version = "1.20.0", features = ["v4"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
walkdir = "2.5"
anyhow = "1.0"
indicatif = "0.18.3"
chrono = "0.4.43"
pyo3 = { version = "0.22", features = ["extension-module"] }
futures = "0.3.31"
