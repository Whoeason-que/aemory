name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to TestPyPI?"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          # x86 temporarily disabled due to lance-core 2.0.1 i686 compilation bug
          # Tracking: https://github.com/lancedb/lance/issues
          # - runner: ubuntu-22.04
          #   target: x86
          - runner: ubuntu-22.04
            target: aarch64
          # armv7 temporarily disabled due to lance-core 2.0.1 upstream compilation bug
          # Tracking: https://github.com/lancedb/lance/issues
          # - runner: ubuntu-22.04
          #   target: armv7
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Setup protoc
        run: python scripts/download_protoc.py
      - name: Export PROTOC
        run: |
          echo "PROTOC=${GITHUB_WORKSPACE}/protoc/bin/protoc" >> "$GITHUB_ENV"
      - name: Verify protoc
        run: |
          "$PROTOC" --version
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: false
          manylinux: manylinux_2_28
          before-script-linux: |
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache perl cmake make pkgconf
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y perl-IPC-Cmd perl-Time-Piece cmake make pkgconf-pkg-config
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update -qq && apt-get install -y --no-install-recommends perl cmake make pkg-config
            fi
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Setup protoc
        run: python scripts/download_protoc.py
      - name: Export PROTOC
        run: |
          echo "PROTOC=${GITHUB_WORKSPACE}/protoc/bin/protoc" >> "$GITHUB_ENV"
      - name: Verify protoc
        run: |
          "$PROTOC" --version
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: false
          manylinux: musllinux_1_2
          before-script-linux: |
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache perl cmake make pkgconf
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y perl-IPC-Cmd perl-Time-Piece cmake make pkgconf-pkg-config
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update -qq && apt-get install -y --no-install-recommends perl cmake make pkg-config
            fi
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          # ARM64 temporarily disabled due to GitHub Actions Python installation issues
          # Tracking: Python 3.13 ARM64 setup fails on windows-latest
          # - runner: windows-latest
          #   target: aarch64
          #   python_arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.13
          architecture: ${{ matrix.platform.python_arch }}
      - name: Setup protoc
        run: python scripts/download_protoc.py
      - name: Export PROTOC
        shell: pwsh
        run: |
          "PROTOC=$env:GITHUB_WORKSPACE\protoc\bin\protoc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Verify protoc
        shell: pwsh
        run: |
          & "$env:PROTOC" --version
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: true
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Setup protoc
        run: python scripts/download_protoc.py
      - name: Export PROTOC
        run: |
          echo "PROTOC=${GITHUB_WORKSPACE}/protoc/bin/protoc" >> "$GITHUB_ENV"
      - name: Verify protoc
        run: |
          "$PROTOC" --version
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: true
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v5
        with:
          name: wheels-sdist
          path: dist

  # --- 核心修改：测试发布到 TestPyPI ---
  test-publish:
    name: Test Publish
    runs-on: ubuntu-latest
    # 仅当手动触发且勾选了发布选项时运行
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true' }}
    needs: [linux, musllinux, windows, macos, sdist]

    # 建议在 PyPI 设置中创建一个名为 testpypi 的环境
    environment: testpypi

    permissions:
      id-token: write # 获取 OIDC 令牌的关键
      contents: read

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Publish to TestPyPI
        # uv 会自动识别 TestPyPI 的 OIDC 流程
        # 注意：使用 --publish-url 而不是 --index-url (后者是用来下载的)
        run: uv publish --publish-url https://test.pypi.org/legacy/ dist/*
