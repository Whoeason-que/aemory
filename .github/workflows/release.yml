name: Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "pypi"
        type: choice
        options:
          - pypi

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # --- 构建 Linux 轮子 ---
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Setup protoc
        run: python scripts/download_protoc.py
      - name: Export PROTOC
        run: |
          echo "PROTOC=${GITHUB_WORKSPACE}/protoc/bin/protoc" >> "$GITHUB_ENV"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: false
          manylinux: manylinux_2_28
          before-script-linux: |
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache perl cmake make pkgconf
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y perl-IPC-Cmd perl-Time-Piece cmake make pkgconf-pkg-config
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update -qq && apt-get install -y --no-install-recommends perl cmake make pkg-config
            fi
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  # --- 构建 Musl Linux 轮子 ---
  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Setup protoc
        run: python scripts/download_protoc.py
      - name: Export PROTOC
        run: |
          echo "PROTOC=${GITHUB_WORKSPACE}/protoc/bin/protoc" >> "$GITHUB_ENV"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: false
          manylinux: musllinux_1_2
          before-script-linux: |
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache perl cmake make pkgconf
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y perl-IPC-Cmd perl-Time-Piece cmake make pkgconf-pkg-config
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update -qq && apt-get install -y --no-install-recommends perl cmake make pkg-config
            fi
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  # --- 构建 Windows 轮子 ---
  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.13
          architecture: ${{ matrix.platform.python_arch }}
      - name: Setup protoc
        run: python scripts/download_protoc.py
      - name: Export PROTOC
        shell: pwsh
        run: |
          "PROTOC=$env:GITHUB_WORKSPACE\protoc\bin\protoc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: true
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  # --- 构建 macOS 轮子 ---
  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Setup protoc
        run: python scripts/download_protoc.py
      - name: Export PROTOC
        run: |
          echo "PROTOC=${GITHUB_WORKSPACE}/protoc/bin/protoc" >> "$GITHUB_ENV"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: true
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  # --- 构建 源码包 (sdist) ---
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v5
        with:
          name: wheels-sdist
          path: dist

  # --- 核心修改：发布到 PyPI (使用 Trusted Publishing) ---
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target == 'pypi' }}
    needs: [linux, musllinux, windows, macos, sdist]

    # 必须指定 environment，确保与 PyPI 后台配置一致
    environment: pypi

    permissions:
      id-token: write # 允许获取 OIDC 令牌
      attestations: write # 允许写入证明
      contents: read # 读取内容

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "dist/*"

      - name: Install uv
        uses: astral-sh/setup-uv@v5 # 建议使用稳定版本

      - name: Publish to PyPI
        # 此时 uv 会自动寻找 OIDC 令牌，无需设置 UV_PUBLISH_TOKEN
        run: uv publish dist/*
